<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TV</title><link rel="stylesheet" href="/style.css"/></head><body>
<main class="tv-wrap"><section class="panel tv-card fade-in"><h1 class="title flicker">🔥 Koh Lanta — Ftour des Aventuriers</h1><div id="meta" class="small"></div><div id="phaseView" class="mt"></div><h2 class="mt">Classement</h2><div id="scores" class="tv-players"></div></section></main>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io({transports:['websocket','polling']});const meta=document.getElementById('meta'),phaseView=document.getElementById('phaseView'),scores=document.getElementById('scores'); let lastResult=null;
function render(s){meta.textContent=`Phase ${s.phase} • Joueurs ${s.playerCount} • ${s.paused?'PAUSE':'LIVE'}`;
const gs=s.gameState||{};
if(s.phase==='GAME_A') phaseView.innerHTML=`<div class='panel'><h2>Jeu A — Susceptible de...</h2><p>${gs.question||'Question en cours...'}</p></div>`;
else if(s.phase==='GAME_B') phaseView.innerHTML=`<div class='panel'><h2>Jeu B — Rapidité</h2><p>${gs.prompt||''}</p></div>`;
else if(s.phase==='GAME_C') phaseView.innerHTML=`<div class='panel'><h2>Jeu C — Prix juste</h2><p>Item: <strong>${gs.item||''}</strong></p></div>`;
else if(s.phase==='GAME_D') phaseView.innerHTML=`<div class='panel'><h2>Jeu D — Top 3 Maroc</h2><p>Thème: <strong>${gs.theme||''}</strong></p></div>`;
else if(s.phase==='GAME_E') phaseView.innerHTML=`<div class='panel'><h2>Jeu E — Partager / Trahir</h2><p>Round ${gs.round||1}/3</p></div>`;
else if(s.phase==='COUNCIL') phaseView.innerHTML=`<div class='panel'><h2>Conseil</h2><p>Les votes sont en cours...</p></div>`;
else if(s.phase==='FINAL') phaseView.innerHTML=`<div class='panel'><h2>Finale</h2><p>${gs.question||''}</p></div>`;
else if(s.phase==='END') phaseView.innerHTML=`<div class='panel'><h2>🏆 Survivant du Ftour des Aventuriers</h2><p>Le podium est affiché.</p></div>`;
else phaseView.innerHTML=`<div class='panel'><h2>${s.phase}</h2><p>Préparation...</p></div>`;
if(lastResult) phaseView.innerHTML += `<div class='panel mt'><h3>Dernier résultat</h3><pre class='small'>${JSON.stringify(lastResult,null,2)}</pre></div>`;
scores.innerHTML=(s.rankings||[]).slice(0,10).map(p=>`<article class='panel'><strong>#${p.rank} ${p.name}</strong><div>${p.score} pts ${p.eliminated?' • Eliminé':''}</div></article>`).join('');}
socket.on('game:state',render);socket.on('results:publish',(r)=>{lastResult=r;});
</script></body></html>
