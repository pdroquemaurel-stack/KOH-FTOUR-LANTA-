<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TV</title><link rel="stylesheet" href="/style.css"/></head><body class="tv-stage">
<main class="tv-layout">
  <section class="tv-main">
    <div id="bigPhase" class="tv-phase"></div>
    <div id="bigQuestion" class="tv-question"></div>
    <div id="bigRule" class="tv-rule"></div>
    <div id="resultsBlock" class="tv-results" style="display:none"></div>
    <div class="tv-progress">
      <div><strong>✅ Ont répondu :</strong> <span id="answeredList">-</span></div>
      <div><strong>⏳ En attente :</strong> <span id="pendingList">-</span></div>
    </div>
    <div id="playersBar" class="tv-players-bar"></div>
  </section>
  <aside class="tv-scoreboard">
    <h3>Classement</h3>
    <ol id="scoreList"></ol>
  </aside>
</main>
<audio id="bgMusic" src="/audio/Koh-Lanta Main Theme (Aventuri)  EPIC VERSION.mp3" loop autoplay></audio>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io({transports:['websocket','polling']});
const bigPhase=document.getElementById('bigPhase');
const bigQuestion=document.getElementById('bigQuestion');
const bigRule=document.getElementById('bigRule');
const playersBar=document.getElementById('playersBar');
const answeredList=document.getElementById('answeredList');
const pendingList=document.getElementById('pendingList');
const scoreList=document.getElementById('scoreList');
const resultsBlock=document.getElementById('resultsBlock');
const bgMusic=document.getElementById('bgMusic');
bgMusic.volume=0.5;

function phaseText(phase){
  const map={LOBBY:'Lobby',INTRO:'Introduction',GAME_A:'Jeu A',RESULTS_A:'Résultats A',GAME_B:'Jeu B',RESULTS_B:'Résultats B',GAME_C:'Jeu C',RESULTS_C:'Résultats C',GAME_D:'Jeu D',RESULTS_D:'Résultats D',GAME_E:'Jeu E',RESULTS_E:'Résultats E',COUNCIL:'Conseil',COUNCIL_RESULT:'Résultat Conseil',FINAL:'Finale',FINAL_RESULT:'Résultat Finale',END:'Fin'};
  return map[phase]||phase;
}
function rulesFor(s){
  const map={GAME_A:'Vote pour un joueur. 1 vote unique.',GAME_B:'Trouve la bonne réponse le plus vite possible.',GAME_C:'Devine le juste prix le plus proche.',GAME_D:'Donne tes 3 meilleures réponses.',GAME_E:'Choisis PARTAGER ou TRAHIR.',COUNCIL:'Vote contre un joueur.',FINAL:'Parie puis réponds à la question finale.'};
  if(map[s.phase]) return s.resultsShown?'Résultats affichés. Réponses fermées.':map[s.phase];
  return 'Le Ftour des Aventuriers';
}
function questionFor(s){
  const g=s.gameState||{};
  if(s.phase==='GAME_A') return g.question||'Question en cours...';
  if(s.phase==='GAME_B') return g.prompt||'Question en cours...';
  if(s.phase==='GAME_C') return g.item?`Prix à estimer : ${g.item}`:'Question en cours...';
  if(s.phase==='GAME_D') return g.theme?`Thème : ${g.theme}`:'Question en cours...';
  if(s.phase==='FINAL') return g.question||'Question finale';
  return 'Le Ftour des Aventuriers';
}
function renderResults(s){
  const r=s.gameState?.results;
  if(!s.resultsShown||!r){resultsBlock.style.display='none'; return;}
  const nameById = Object.fromEntries((s.rankings||[]).map((p)=>[p.playerId,p.name]));
  if(r.game==='A'){
    const top3=(r.top3||[]).map((x,idx)=>`<li>#${idx+1} ${nameById[x.playerId]||x.playerId} (${x.votesCount})</li>`).join('');
    const impacts=(s.rankings||[]).map((p)=>{const d=(r.impacts||{})[p.playerId]||0; const cls=d>0?'plus':(d<0?'minus':''); const text=d>0?`+${d}`:`${d}`; return `<li>${p.name} <span class='${cls}'>${text}</span></li>`}).join('');
    resultsBlock.innerHTML=`<h3>Top 3 des plus cités</h3><ol>${top3||'<li>Aucun</li>'}</ol><h3>Impact points</h3><ul>${impacts}</ul>`;
  } else {
    const pretty=JSON.stringify(r,(k,v)=>nameById[v]||v,2);
    resultsBlock.innerHTML=`<h3>Résultats ${r.game||''}</h3><pre>${pretty}</pre>`;
  }
  resultsBlock.style.display='block';
}

socket.on('game:state',(s)=>{
  bigPhase.textContent=phaseText(s.phase);
  bigQuestion.textContent=questionFor(s);
  bigRule.textContent=rulesFor(s);
  bgMusic.muted=!!s.tvMuted;
  if(!bgMusic.muted){ bgMusic.play().catch(()=>{}); }
  renderResults(s);
  const nameById = Object.fromEntries((s.rankings||[]).map((p)=>[p.playerId,p.name]));
  const answeredIds=(s.gameProgress?.answeredPlayerIds||s.gameAProgress?.answeredPlayerIds||[]);
  const pendingIds=(s.gameProgress?.pendingPlayerIds||s.gameAProgress?.pendingPlayerIds||[]);
  const answered=answeredIds.map((id)=>nameById[id]||id);
  const pending=pendingIds.map((id)=>nameById[id]||id);
  answeredList.textContent = answered.length ? answered.join(', ') : '-';
  pendingList.textContent = pending.length ? pending.join(', ') : '-';

  playersBar.innerHTML=(s.rankings||[]).map(p=>`<span class='${answeredIds.includes(p.playerId)?'answered':''}'>${p.name}</span>`).join('');
  scoreList.innerHTML=(s.rankings||[]).map(p=>`<li><span class='${answeredIds.includes(p.playerId)?'answered':''}'>${p.name}</span><strong>${p.score}</strong></li>`).join('');
});
</script></body></html>
