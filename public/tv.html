<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TV</title><link rel="stylesheet" href="/style.css"/></head><body class="tv-stage">
<main class="tv-layout">
  <section class="tv-main">
    <div id="gameBQuestionIndex" class="tv-gameb-index" style="display:none"></div>
    <div id="bigQuestion" class="tv-question"></div>
    <div id="questionTimer" class="tv-question-timer" style="display:none">⏱️ <span id="questionTimerValue">--</span>s</div>
    <div id="bigRule" class="tv-rule"></div>
    <div id="awardFlash" class="tv-award-flash" style="display:none"></div>
    <div id="resultsBlock" class="tv-results" style="display:none"></div>
  </section>
  <aside class="tv-scoreboard"><h3>Classement</h3><ol id="scoreList"></ol></aside>
</main>
<audio id="bgMusic" src="/audio/Koh-Lanta Main Theme (Aventuri)  EPIC VERSION.mp3" loop autoplay></audio>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io({transports:['websocket','polling']});
const bigQuestion=document.getElementById('bigQuestion');
const gameBQuestionIndex=document.getElementById('gameBQuestionIndex');
const bigRule=document.getElementById('bigRule');
const questionSeriesInfo=document.getElementById('questionSeriesInfo');
const scoreList=document.getElementById('scoreList');
const resultsBlock=document.getElementById('resultsBlock');
const timerEl=document.getElementById('questionTimer');
const timerValueEl=document.getElementById('questionTimerValue');
const awardFlash=document.getElementById('awardFlash');
const bgMusic=document.getElementById('bgMusic');
bgMusic.volume=0.5;
let audioErrorSent=false;
let timerInterval=null;
let lastTickSecond=null;
const beepCtx = (window.AudioContext||window.webkitAudioContext) ? new (window.AudioContext||window.webkitAudioContext)() : null;
function reportAudioError(reason){
  if(audioErrorSent) return;
  audioErrorSent=true;
  socket.emit('tv:audio_error',{reason:String(reason||'AUDIO_PLAY_BLOCKED')});
}
function beep(){
  if(!beepCtx) return;
  if(beepCtx.state==='suspended') beepCtx.resume().catch(()=>{});
  const o=beepCtx.createOscillator();
  const g=beepCtx.createGain();
  o.frequency.value=880;
  o.type='square';
  g.gain.value=0.05;
  o.connect(g); g.connect(beepCtx.destination);
  const t=beepCtx.currentTime;
  o.start(t); o.stop(t+0.08);
}
function stopCountdown(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  timerEl.style.display='none';
  timerValueEl.textContent='--';
  lastTickSecond=null;
}
function startCountdown(state){
  stopCountdown();
  if(state.phase!=='GAME_B' || state.gameState?.stage!=='QUESTION' || !state.phaseTimer?.endsAt){ return; }
  timerEl.style.display='';
  const tick=()=>{
    const remain=Math.max(0, Math.ceil((Number(state.phaseTimer.endsAt)-Date.now())/1000));
    timerValueEl.textContent=remain;
    if(remain<=5 && remain>0 && remain!==lastTickSecond){ beep(); lastTickSecond=remain; }
    if(remain<=0) stopCountdown();
  };
  tick();
  timerInterval=setInterval(tick,200);
}

function gameMeta(game){
  const map={
    GAME_A:{name:'Jeu A — Susceptible de...',rules:'Vote pour un joueur (1 vote unique).',points:'Top visé: +1 | joueur top: -2 | vote isolé: -1'},
    GAME_B:{name:'Jeu B — 1 bonne réponse',rules:'Réponds librement, validation en correction admin.',points:'Points accordés manuellement en correction'},
    GAME_C:{name:'Jeu C — Le juste prix',rules:'Estime le prix sans le dépasser.',points:'+2 meilleur prix <= réel, +1 second meilleur <= réel'},
    GAME_D:{name:'Jeu D — Blind test',rules:'Trouver titre et/ou artiste.',points:'🎵 titre +0,5 | 🎤 artiste +0,5'},
    GAME_F:{name:"Jeu F — Tir à l'arc",rules:'Ajuste horizontal puis vertical.',points:'Règles dynamiques de survie'},
    GAME_G:{name:'Jeu G — Imposteur',rules:'Identifier les imposteurs.',points:'+1 ou +2 selon le résultat'},
    GAME_H:{name:'Jeu H — Totem caché',rules:'Clique le plus vite après apparition.',points:'Top 1: +3 | Top 2: +2 | Top 3: +1'},
    GAME_I:{name:'Jeu I — Porte cachée',rules:'Choisir une porte.',points:'Récompense selon la porte gagnante'}
  };
  return map[game]||{name:game||'Jeu',rules:'',points:''};
}
function rulesFor(s){
  if(s.phase==='WAITING'){
    const meta=gameMeta(s.gameState?.game||s.previewGame?.game);
    return `${meta.rules} • ${meta.points}`.trim();
  }
  const map={GAME_A:'Vote pour un joueur. 1 vote unique.',GAME_B:'1 bonne réponse par question. Répondez librement.',GAME_C:'Devine le juste prix le plus proche sans dépasser.',GAME_D:'Blind test: titre/artiste.',GAME_E:'Choisis PARTAGER ou TRAHIR.',GAME_F:'Vise verticalement puis horizontalement.',GAME_G:'Imposteur: observez les votes et les passages.',GAME_H:"Réagis dès l'apparition du totem.",GAME_I:'Choisissez une porte. Une seule cache le totem.',COUNCIL:'Vote contre un joueur.',FINAL:'Parie puis réponds à la question finale.',END:'🏆 Classement final'};
  return map[s.phase]||'';
}
function questionFor(s){
  const g=s.gameState||{};
  if(s.phase==='GAME_A') return g.question||'Question en cours...';
  if(s.phase==='GAME_B'){
    if(g.stage==='QUESTION') return g.questions?.[g.currentIndex]?.prompt||'Question en cours...';
    if(g.stage==='REVIEW') return g.questions?.[g.reviewIndex]?.prompt||'Correction en cours...';
    return 'Question en cours...';
  }
  if(s.phase==='WAITING'){ const game=s.gameState?.game||s.previewGame?.game; const meta=gameMeta(game); return `${meta.name}`; }
  if(s.phase==='GAME_C') return g.item?`Prix à estimer : ${g.item}`:'Question en cours...';
  if(s.phase==='GAME_D') return g.stage==='RESULT' ? 'Résultat du blind test' : '🎵 Blind test en cours';
  if(s.phase==='GAME_F') return 'Vise bien ou fais toi des amis';
  if(s.phase==='GAME_G'){ if(g.stage==='WORD_REVEAL') return `Les aventuriers prennent connaissance de leur destin… (${Object.keys(g.hasSeenWord||{}).length}/${(s.rankings||[]).filter((p)=>!p.eliminated).length})`; if(g.stage==='PASSAGES') return `🔥 C'est au tour de : ${ (s.rankings||[]).find((p)=>p.playerId===g.passageOrder?.[g.passageOrder.length-1])?.name || '...'}`; if(g.stage==='VOTE') return "QUI EST L'IMPOSTEUR ?"; return 'Révélation finale'; }
  if(s.phase==='GAME_H') return g.stage==='REVEALED' ? 'apres-totem.webp' : 'avant-totem.webp';
  if(s.phase==='GAME_I') return g.stage==='RESULT' ? `Porte gagnante: ${g.results?.winningDoor||g.winningDoor||'?'}` : 'Porte cachée: 1, 2 ou 3';
  if(s.phase==='FINAL') return g.question||'Question finale';
  if(s.phase==='END') return '🏆 LE SURVIVANT DU FTOUR';
  return '';
}
function arrowsIcons(p){
  const total=2;
  const left=Math.max(0,Math.min(total,Number(p.arrows??2)));
  const broken=Math.max(0,total-left);
  return `<span class='tv-arrows'>${'<img src="/Visuels/archery_arrow_intact.png" alt="flèche intacte"/>' .repeat(left)}${'<img src="/Visuels/archery_arrow_broken.png" alt="flèche cassée"/>' .repeat(broken)}</span>`;
}
function renderResults(s){
  const r=s.gameState?.results;
  if(!s.resultsShown||!r){resultsBlock.style.display='none'; resultsBlock.classList.remove('archery-results'); return;}
  const nameById = Object.fromEntries((s.rankings||[]).map((p)=>[p.playerId,p.name]));
  resultsBlock.classList.remove('archery-results');
  if(r.game==='A'){
    const top3=(r.top3||[]).map((x,idx)=>`<li>#${idx+1} ${nameById[x.playerId]||x.playerId} (${x.votesCount})</li>`).join('');
    const impacts=(s.rankings||[]).map((p)=>{const d=(r.impacts||{})[p.playerId]||0; const cls=d>0?'plus':(d<0?'minus':''); const text=d>0?`+${d}`:`${d}`; return `<li>${p.name} <span class='${cls}'>${text}</span></li>`}).join('');
    resultsBlock.innerHTML=`<h3>Top 3 des plus cités</h3><ol>${top3||'<li>Aucun</li>'}</ol><h3>Impact points</h3><ul>${impacts}</ul>`;
  } else if(r.game==='F') {
    const colors=r.playerColors||{};
    const participatedShots=(r.shots||[]);
    const shots=participatedShots.map((shot)=>{
      const left=50 + (shot.x/2);
      const top=50 - (shot.y/2);
      const color=colors[shot.pid]||'#fff';
      const name=nameById[shot.pid]||shot.pid;
      return `<span class='archery-shot-wrap' style='left:${left}%;top:${top}%;color:${color}'><span class='archery-shot' style='background:${color}' title='${name}'></span><span class='archery-shot-name'>${name}</span></span>`;
    }).join('');
    const withDistance=participatedShots.map((shot)=>({
      pid:shot.pid,
      distance:Math.hypot(Number(shot.x)||0, Number(shot.y)||0)
    }));
    withDistance.sort((a,b)=>a.distance-b.distance);
    const closestPid=withDistance[0]?.pid;
    const farthestPid=withDistance[withDistance.length-1]?.pid;
    const closest=nameById[closestPid]||closestPid||'-';
    const farthest=nameById[farthestPid]||farthestPid||'-';
    const breakInfo=r.breakChoice?`<p>${nameById[r.breakChoice.by]||r.breakChoice.by} casse une flèche de ${nameById[r.breakChoice.target]||r.breakChoice.target}</p>`:'';
    const winner=r.winner?`<p><strong>🏆 Vainqueur: ${nameById[r.winner]||r.winner}</strong></p>`:'';
    const noShot=(r.noShot||[]).length?`<p>❌ Sans tir (perdent 1 flèche): ${(r.noShot||[]).map((pid)=>nameById[pid]||pid).join(', ')}</p>`:'';
    resultsBlock.classList.add('archery-results');
    resultsBlock.innerHTML=`<h3>Résultats Tir à l'arc</h3><div class='archery-target'><img src='/Visuels/archery_target_board.webp' alt='Cible' loading='lazy' decoding='async' onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src=this.src.replace(/\.webp$/i,'.png');}"/>${shots}</div><p>🎯 Plus proche (participants): <strong>${closest}</strong></p><p>💥 Plus éloigné (participants): <strong>${farthest}</strong> (perd 1 flèche)</p>${noShot}${breakInfo}${winner}`;
  } else if(r.game==='C') {
    const closest=r.closestUnder||[];
    const rows=(r.answers||[]).map((a)=>{
      const name=nameById[a.pid]||a.pid;
      const over=a.value>r.real;
      const isTop=closest.includes(a.pid);
      const pts=a.pid===r.first?'+2':(a.pid===r.second?'+1':'');
      return `<li class='price-row ${over?'over':''} ${isTop?'under-best':''}'><span>${name}</span><span>${a.value} dh ${pts?`<strong>${pts}pt</strong>`:''}</span></li>`;
    }).join('');
    const refRow=`<li class='price-row price-ref'><span>🎯 Prix réel</span><span>${r.real} dh</span></li>`;
    const mixed=[...(r.answers||[]),{pid:'__REAL__',value:r.real,real:true}].sort((a,b)=>b.value-a.value).map((e)=>{
      if(e.real) return refRow;
      const name=nameById[e.pid]||e.pid;
      const over=e.value>r.real;
      const isTop=closest.includes(e.pid);
      const pts=e.pid===r.first?'+2':(e.pid===r.second?'+1':'');
      return `<li class='price-row ${over?'over':''} ${isTop?'under-best':''}'><span>${name}</span><span>${e.value} dh ${pts?`<strong>${pts}pt</strong>`:''}</span></li>`;
    }).join('');
    resultsBlock.innerHTML=`<h3>Jeu C — Classement des prix (du + cher au - cher)</h3><ul class='price-list'>${mixed||'<li>Aucune réponse</li>'}</ul>`;
  } else if(r.game==='D') {
    const winnerRows=(r.winners||[]).map((w)=>`<li><strong>${nameById[w.pid]||w.pid}</strong> <span class='plus'>+${w.gained} pt</span></li>`).join('');
    const big=(r.winners||[]).map((w)=>`<p class='blind-winner'>${nameById[w.pid]||w.pid} <span>+${w.gained}pt</span></p>`).join('');
    resultsBlock.innerHTML=`<h3>Blind test</h3><p>Chanson: <strong>${r.songTitle||'—'}</strong> — ${r.artist||'—'}</p>${big||'<p>Aucun point attribué.</p>'}<ul>${winnerRows}</ul>`;
  } else if(r.game==='B' && r.mode==='manual_review') {
    const idx=Number(s.gameState?.reviewIndex||0);
    const current=r.questions?.[idx]||r.questions?.[0]||{question:'',expected:'',answers:[]};
    const cards=(current.answers||[]).map((it)=>`<article class='tv-free-answer-card ${it.validated?'validated':''}'><div class='tv-free-answer-name'>${it.name}</div><div class='tv-free-answer-text'>${it.answer||'—'}</div></article>`).join('');
    resultsBlock.innerHTML=`<h3>Jeu B — Correction ${idx+1}/${(r.questions||[]).length||1}</h3><p class='small'>Bonne réponse: <strong>${current.expected||'—'}</strong></p><div class='tv-free-answer-grid'>${cards||'<p>Aucune réponse</p>'}</div>`;
  } else if(r.game==='H'){
    const top=(r.top5||[]).map((e,idx)=>`<li>#${idx+1} ${nameById[e.pid]||e.pid} — ${e.deltaMs} ms</li>`).join('');
    resultsBlock.innerHTML=`<h3>Totem caché — Top 5</h3><ol>${top||'<li>Aucun clic</li>'}</ol>`;
  } else if(r.game==='I'){
    resultsBlock.innerHTML=`<h3>Porte gagnante: ${r.winningDoor}</h3>`;
  } else if(r.game==='G'){
    const imposteurs=(r.impostorIds||[]).map((id)=>nameById[id]||id).join(', ');
    resultsBlock.innerHTML=`<h3>Imposteurs révélés</h3><p>${imposteurs||'Aucun'}</p>`;
  } else {
    const pretty=JSON.stringify(r,(k,v)=>nameById[v]||v,2);
    resultsBlock.innerHTML=`<h3>Résultats ${r.game||''}</h3><pre>${pretty}</pre>`;
  }
  resultsBlock.style.display='block';
}

socket.on('game:state',(s)=>{
  bigQuestion.textContent=questionFor(s);
  bigRule.textContent=rulesFor(s);
  if(s.phase==='GAME_B'){ const idx=s.gameState?.stage==='REVIEW'?Number(s.gameState?.reviewIndex||0):Number(s.gameState?.currentIndex||0); const total=(s.gameState?.questions||[]).length||1; gameBQuestionIndex.style.display='block'; gameBQuestionIndex.textContent=`Question ${idx+1}/${total}`; } else { gameBQuestionIndex.style.display='none'; }
  if(s.phase==='END'){
    const top=(s.gameState?.finalRanking||s.rankings||[]).slice(0,3);
    resultsBlock.style.display='block';
    resultsBlock.innerHTML=`<h2>🏆 LE SURVIVANT DU FTOUR</h2><p>🥇 ${top[0]?.name||'-'} — ${top[0]?.score||0} pts</p><p>🥈 ${top[1]?.name||'-'} — ${top[1]?.score||0} pts</p><p>🥉 ${top[2]?.name||'-'} — ${top[2]?.score||0} pts</p>`;
  }
  bgMusic.muted=!!s.tvMuted;
  if(!bgMusic.muted){ bgMusic.play().catch((e)=>reportAudioError(e?.message||'AUDIO_PLAY_BLOCKED')); }
  startCountdown(s);
  renderResults(s);
  const answeredIds=(s.gameProgress?.answeredPlayerIds||s.gameAProgress?.answeredPlayerIds||[]);
  scoreList.innerHTML=(s.rankings||[]).map(p=>`<li><span class='tv-player ${answeredIds.includes(p.playerId)?'answered':''}'><img class='tv-avatar' src='/${encodeURI(String(p.animal||'').replace(/\.png$/i,'.webp'))}' alt='Avatar' loading='lazy' decoding='async' onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src=this.src.replace(/\.webp$/i,'.png');}"/><span>${p.name} ${arrowsIcons(p)}</span></span><strong>${p.score}</strong></li>`).join('');
});
</script></body></html>
