<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TV • Koh Lanta</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="tv-wrap">
    <section class="panel tv-card fade-in">
      <h1 class="title flicker">🔥 Le Ftour des Aventuriers</h1>
      <div class="small" id="meta"></div>
      <div id="view"></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ['websocket','polling'] });
    const meta = document.getElementById('meta');
    const view = document.getElementById('view');

    function render(s) {
      meta.textContent = `SESSION UNIQUE • ${s.playerCount} aventuriers • ${s.locked ? 'VERROUILLÉE' : 'OUVERTE'}`;
      if (s.screen === 'LOBBY') {
        view.innerHTML = `<div class='panel mt'><h2>Les aventuriers arrivent...</h2></div>
        <section class='tv-players mt'>${s.players.map(p => `<article class='panel'><strong>${p.name}</strong><div class='small'>Animal: ${p.animal}</div><span class='status-chip ${p.status==='CONNECTED'?'connected':'disconnected'}'>${p.status}</span></article>`).join('')}</section>`;
      } else if (s.screen === 'WAITING') {
        view.innerHTML = `<div class='panel mt'><h2>Les Aventuriers se rassemblent…</h2><p>Le conseil va commencer.</p></div>`;
      } else {
        view.innerHTML = `<div class='panel mt'><h2>Épreuve à venir</h2><p>Placeholder mini-jeu.</p></div>`;
      }
    }

    socket.on('tv:state', render);
  </script>
</body>
</html>
