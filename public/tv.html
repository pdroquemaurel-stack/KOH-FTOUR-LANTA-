<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TV</title><link rel="stylesheet" href="/style.css"/></head><body class="tv-stage">
<main class="tv-layout">
  <section class="tv-main">
    <div id="questionSeriesInfo" class="tv-series-info"></div>
    <div id="bigQuestion" class="tv-question"></div>
    <div id="questionTimer" class="tv-question-timer" style="display:none">⏱️ <span id="questionTimerValue">--</span>s</div>
    <div id="bigRule" class="tv-rule"></div>
    <div id="awardFlash" class="tv-award-flash" style="display:none"></div>
    <div id="resultsBlock" class="tv-results" style="display:none"></div>
  </section>
  <aside class="tv-scoreboard"><h3>Classement</h3><ol id="scoreList"></ol></aside>
</main>
<audio id="bgMusic" src="/audio/Koh-Lanta Main Theme (Aventuri)  EPIC VERSION.mp3" loop autoplay></audio>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io({transports:['websocket','polling']});
const bigQuestion=document.getElementById('bigQuestion');
const bigRule=document.getElementById('bigRule');
const questionSeriesInfo=document.getElementById('questionSeriesInfo');
const scoreList=document.getElementById('scoreList');
const resultsBlock=document.getElementById('resultsBlock');
const timerEl=document.getElementById('questionTimer');
const timerValueEl=document.getElementById('questionTimerValue');
const awardFlash=document.getElementById('awardFlash');
const bgMusic=document.getElementById('bgMusic');
let timerInterval=null,lastTickSecond=null,lastAwardAt='';
const beepCtx=(window.AudioContext||window.webkitAudioContext)?new (window.AudioContext||window.webkitAudioContext)():null;
function beep(){ if(!beepCtx) return; if(beepCtx.state==='suspended') beepCtx.resume().catch(()=>{}); const o=beepCtx.createOscillator(), g=beepCtx.createGain(); o.frequency.value=880; g.gain.value=.05; o.connect(g); g.connect(beepCtx.destination); const t=beepCtx.currentTime; o.start(t); o.stop(t+.08);} 
function avatarSrc(v){ const s=String(v||''); return s.includes('/') ? '/' + encodeURI(s) : '/Visuels/joueur/Lion rouge sang.png'; }
function stopCountdown(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} timerEl.style.display='none'; timerValueEl.textContent='--'; lastTickSecond=null; }
function startCountdown(state){ stopCountdown(); if(state.phase!=='GAME_B'||state.gameState?.stage!=='QUESTION'||!state.phaseTimer?.endsAt) return; timerEl.style.display=''; const tick=()=>{const remain=Math.max(0,Math.ceil((Number(state.phaseTimer.endsAt)-Date.now())/1000)); timerValueEl.textContent=remain; if(remain<=5&&remain>0&&remain!==lastTickSecond){beep();lastTickSecond=remain;} if(remain<=0) stopCountdown();}; tick(); timerInterval=setInterval(tick,200);} 
function rulesFor(s){ const map={GAME_A:'Vote pour un joueur.',GAME_B:'1 bonne réponse par question.',GAME_C:'Le juste prix en dirham.',GAME_D:'Blind test: titre + artiste.',GAME_E:'Choisis PARTAGER ou TRAHIR.',GAME_F:'Vise puis tire.',COUNCIL:'Vote secret.',FINAL:'Parie puis réponds.'}; return map[s.phase]||''; }
function questionFor(s){ const g=s.gameState||{}; if(s.previewGame) return s.previewGame.title||''; if(s.phase==='GAME_A') return g.question||''; if(s.phase==='GAME_B'){ if(g.stage==='QUESTION') return g.questions?.[g.currentIndex]?.prompt||''; if(g.stage==='REVIEW') return g.questions?.[g.reviewIndex]?.prompt||''; return ''; } if(s.phase==='GAME_C') return g.item?`Objet : ${g.item}`:''; if(s.phase==='GAME_D') return g.stage==='PREVIEW'?'Blind test prêt ?':(g.prompt||'Blind test'); if(s.phase==='GAME_F') return 'Vise bien ou fais toi des amis'; if(s.phase==='FINAL') return g.question||''; return ''; }
function questionSeriesText(s){ if(s.phase!=='GAME_B') return ''; const g=s.gameState||{}; const total=(g.questions||[]).length||0; if(!total) return ''; const idx=g.stage==='REVIEW'?Number(g.reviewIndex||0):Number(g.currentIndex||0); return `Question ${Math.max(1,idx+1)} / ${total}`; }
function arrowsIcons(p){ const left=Math.max(0,Math.min(2,Number(p.arrows??2))); const broken=2-left; return `<span class='tv-arrows'>${'<img src="/Visuels/archery_arrow_intact.png" alt="flèche intacte"/>'.repeat(left)}${'<img src="/Visuels/archery_arrow_broken.png" alt="flèche cassée"/>'.repeat(broken)}</span>`; }
function renderAward(s){ const a=s.lastAward; if(!a||!a.at||a.at===lastAwardAt) return; lastAwardAt=a.at; awardFlash.innerHTML=`<div>${a.name}</div><div class='plus'>+${a.delta}</div>`; awardFlash.style.display=''; setTimeout(()=>{awardFlash.style.display='none';},2200); }
function renderResults(s){ const r=s.gameState?.results; if(!s.resultsShown||!r){resultsBlock.style.display='none'; return;}
  resultsBlock.style.overflow='auto'; if(r.game==='C'){
    resultsBlock.style.overflow='hidden'; const vals=(r.answers||[]).map(x=>Number(x.value)).filter(n=>!Number.isNaN(n)); const real=Number(r.real||0); const min=Math.min(real,...vals), max=Math.max(real,...vals), span=Math.max(1,max-min); const nameById=Object.fromEntries((s.rankings||[]).map(p=>[p.playerId,p.name])); const dots=(r.answers||[]).map(x=>{const pct=((Number(x.value)-min)/span)*100; return `<div class='price-dot' style='left:${pct}%'><span>●</span><small>${nameById[x.pid]||x.pid}<br/>${x.value} DH</small></div>`;}).join(''); const rp=((real-min)/span)*100; resultsBlock.innerHTML=`<h3>Le juste prix — Frise</h3><div class='price-line-wrap big'><div class='price-line'></div>${dots}<div class='price-real' style='left:${rp}%'><span>◉</span><small>${real} DH</small></div></div><p class='small'>${Math.round(min)} DH → ${Math.round(max)} DH</p>`; }
 else {resultsBlock.innerHTML=`<h3>Résultats ${r.game||''}</h3><pre>${JSON.stringify(r,null,2)}</pre>`;} resultsBlock.style.display='block'; }
socket.on('game:state',(s)=>{
  bigQuestion.textContent=questionFor(s);
  if(s.previewGame){ bigRule.textContent=`${s.previewGame.rules} • Points: ${s.previewGame.points}`; }
  else bigRule.textContent=rulesFor(s);
  questionSeriesInfo.textContent=questionSeriesText(s);
  startCountdown(s); renderResults(s); renderAward(s);
  const answeredIds=(s.gameProgress?.answeredPlayerIds||[]);
  scoreList.innerHTML=(s.rankings||[]).map(p=>`<li><span class='${answeredIds.includes(p.playerId)?'answered':''}'><img class='tv-player-avatar' src='${avatarSrc(p.animal)}' alt='joueur'/>${p.name} ${arrowsIcons(p)}</span><strong>${p.score}</strong></li>`).join('');
});
</script></body></html>
