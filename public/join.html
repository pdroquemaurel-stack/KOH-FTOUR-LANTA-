<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Player • Koh Lanta</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">📱 Rejoindre la Tribu</h1>
    <section class="panel" id="joinPanel">
      <div class="grid">
        <input id="roomCode" placeholder="Code room" />
        <input id="name" placeholder="Ton pseudo d'aventurier" maxlength="24" />
        <select id="avatar">
          <option>🗿</option><option>🔥</option><option>🐍</option><option>🦁</option><option>🌴</option><option>🦂</option><option>🦅</option>
        </select>
        <button id="joinBtn">Entrer dans la room</button>
      </div>
    </section>

    <section class="panel mt" id="waitingPanel" style="display:none">
      <h2>Tu es dans la Tribu ✅</h2>
      <p id="playerInfo"></p>
      <p class="small" id="tvHint">En attente des instructions de l'Admin…</p>
      <button id="readyBtn" class="secondary">Je suis prêt</button>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ['websocket','polling'] });
    const byId = (id) => document.getElementById(id);
    const pathRoom = (location.pathname.split('/')[2] || '').toUpperCase();
    const roomInput = byId('roomCode');
    roomInput.value = pathRoom;

    let current = { roomCode: '', playerId: '', reconnectToken: '', ready: false };

    function storageKey(roomCode) { return `kla_player_session_${roomCode}`; }

    function loadSession(roomCode) {
      try { return JSON.parse(localStorage.getItem(storageKey(roomCode)) || 'null'); } catch { return null; }
    }

    function saveSession(roomCode, data) {
      localStorage.setItem(storageKey(roomCode), JSON.stringify(data));
    }

    function setJoined(player, roomCode) {
      current.roomCode = roomCode;
      current.playerId = player.playerId;
      current.reconnectToken = player.reconnectToken;
      byId('joinPanel').style.display = 'none';
      byId('waitingPanel').style.display = '';
      byId('playerInfo').textContent = `${player.avatar} ${player.name} • Room ${roomCode}`;
      saveSession(roomCode, { playerId: player.playerId, reconnectToken: player.reconnectToken, name: player.name, avatar: player.avatar });
    }

    byId('joinBtn').onclick = () => {
      const roomCode = roomInput.value.trim().toUpperCase();
      const name = byId('name').value.trim() || 'Aventurier';
      const avatar = byId('avatar').value;
      const sess = loadSession(roomCode);
      socket.emit('room:join', {
        roomCode,
        playerId: sess?.playerId,
        reconnectToken: sess?.reconnectToken,
        name,
        avatar
      }, (res) => {
        if (!res?.ok) return alert(res?.error || 'Join impossible');
        setJoined(res.player, roomCode);
      });
    };

    byId('readyBtn').onclick = () => {
      current.ready = !current.ready;
      socket.emit('player:update', {
        roomCode: current.roomCode,
        playerId: current.playerId,
        ready: current.ready
      });
      byId('readyBtn').textContent = current.ready ? 'Prêt ✅' : 'Je suis prêt';
    };

    socket.on('tv:state', (s) => {
      if (s.roomCode !== current.roomCode) return;
      byId('tvHint').textContent = s.screen === 'LOBBY' ? 'Lobby en cours…' : s.screen === 'WAITING' ? 'Attente collective…' : 'Épreuve à venir…';
    });

    if (pathRoom) {
      const sess = loadSession(pathRoom);
      if (sess?.playerId && sess?.reconnectToken) {
        socket.emit('room:join', {
          roomCode: pathRoom,
          playerId: sess.playerId,
          reconnectToken: sess.reconnectToken,
          name: sess.name,
          avatar: sess.avatar
        }, (res) => {
          if (res?.ok) setJoined(res.player, pathRoom);
        });
      }
    }
  </script>
</body>
</html>
