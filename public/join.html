<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aventurier</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="join-page">
  <div class="container">
    <h1 id="mobileTitle" class="title">🌴 Aventurier</h1>

    <section id="form" class="panel">
      <div class="grid">
        <input id="name" placeholder="Pseudo" maxlength="24" required />

        <div class="character-picker">
          <p class="small">Choisis ton personnage</p>
          <div class="character-carousel-wrap">
            <button id="characterPrev" class="secondary" type="button" aria-label="Personnage précédent">◀</button>
            <div id="characterTrack" class="character-track" aria-live="polite"></div>
            <button id="characterNext" class="secondary" type="button" aria-label="Personnage suivant">▶</button>
          </div>
        </div>

        <button id="join" type="button">Rejoindre</button>
      </div>
    </section>

    <section id="play" class="panel mt" style="display:none">
      <p id="phase"></p>
      <div id="action"></div>
      <p id="ack" class="small"></p>
      <div id="scoreBadge" class="score-badge score-bottom">0 pt</div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ['websocket', 'polling'] });
    const KEY = 'kla_singleton_player_v2';
    let me = null, st = null;
    let gameBUiState = { questionKey: '', value: '', validated: false };

    const CHARACTERS = [
      { file: 'Visuels/joueur/Lion rouge sang.png', color: '#8A0303' },
      { file: 'Visuels/joueur/serpent emeraude.png', color: '#50C878' },
      { file: 'Visuels/joueur/Elephant violet.png', color: '#7F00FF' },
      { file: 'Visuels/joueur/perroquet jaune.png', color: '#FFD300' },
      { file: 'Visuels/joueur/loup noir.png', color: '#000000' },
      { file: 'Visuels/joueur/panda bleu.png', color: '#1E3A8A' },
      { file: 'Visuels/joueur/gorille vert.png', color: '#228B22' },
      { file: 'Visuels/joueur/renard orange.png', color: '#FF6A00' },
      { file: 'Visuels/joueur/tigre rouge.png', color: '#D62828' },
      { file: 'Visuels/joueur/Sanglier marron.png', color: '#6B3E26' }
    ];

    let carouselIndex = 0;
    let selectedCharacter = CHARACTERS[0].file;
    let archeryAnim = { running: false, axis: 'H', horizontal: 0, vertical: 0, dir: 1, raf: null };

    const byId = id => document.getElementById(id);
    const save = v => localStorage.setItem(KEY, JSON.stringify(v));
    const load = () => { try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch { return null; } };

    function normalizeIndex(index) {
      return ((index % CHARACTERS.length) + CHARACTERS.length) % CHARACTERS.length;
    }

    function renderCharacterCarousel() {
      const track = byId('characterTrack');
      if (!track) return;
      const offsets = [-1, 0, 1];
      track.innerHTML = offsets.map((offset) => {
        const idx = normalizeIndex(carouselIndex + offset);
        const c = CHARACTERS[idx];
        const isCenter = offset === 0;
        const selectedClass = c.file === selectedCharacter ? ' selected' : '';
        const characterLabel = c.file.split('/').pop().replace('.png', '');
        return `
          <button
            type="button"
            class="character-card ${isCenter ? 'center' : ''}${selectedClass}"
            data-index="${idx}"
            style="--character-color:${c.color}"
            aria-label="Sélectionner ${characterLabel}"
          >
            <div class="character-thumb">
              <img src="/${encodeURI(c.file)}" alt="${characterLabel}" />
            </div>
          </button>
        `;
      }).join('');

      track.querySelectorAll('.character-card').forEach((el) => {
        el.onclick = () => {
          const idx = Number(el.dataset.index);
          if (Number.isNaN(idx)) return;
          carouselIndex = idx;
          selectedCharacter = CHARACTERS[idx].file;
          renderCharacterCarousel();
        };
      });
    }

    function joined(p) {
      me = p;
      byId('form').style.display = 'none';
      byId('play').style.display = '';
      byId('mobileTitle').textContent = `🌴 ${p.name}`;
    }

    function send(type, payload) {
      socket.emit('game:action', { type, payload }, (r) => {
        const ack = byId('ack');
        if (r?.ok) { ack.classList.remove('error-msg'); ack.textContent = '✅ Réponse envoyée'; return; }
        if (r?.error === 'NO_SELF_VOTE') { ack.classList.add('error-msg'); ack.textContent = "t'es idiot ou tu veux perdre des points ?"; return; }
        if (r?.error === 'NO_ARROWS_LEFT') { ack.classList.add('error-msg'); ack.textContent = "❌ Tu n'as plus de flèche, tu ne peux plus jouer."; return; }
        ack.classList.add('error-msg'); ack.textContent = `❌ ${r?.error || 'Erreur'}`;
      });
    }


    function clearAck() {
      const ack = byId('ack');
      ack.classList.remove('error-msg');
      ack.textContent = '';
    }

    function playerList() {
      return (st?.rankings || [])
        .filter((p) => !p.eliminated)
        .map((p) => `<option value='${p.playerId}' ${p.playerId === me?.playerId ? 'selected' : ''}>${p.name}</option>`)
        .join('');
    }

    function updateScore() {
      if (!st || !me) return;
      const meState = (st.rankings || []).find((p) => p.playerId === me.playerId);
      byId('scoreBadge').textContent = `${meState?.score || 0} pt`;
    }

    function stopArcheryAnim() { if (archeryAnim.raf) { cancelAnimationFrame(archeryAnim.raf); archeryAnim.raf = null; } archeryAnim.running = false; }
    function startArcheryAnim() {
      if (archeryAnim.running) return;
      archeryAnim.running = true;
      const tick = () => {
        if (!archeryAnim.running) return;
        const speed = 2.8;
        if (archeryAnim.axis === 'H') {
          archeryAnim.horizontal += speed * archeryAnim.dir;
          if (archeryAnim.horizontal >= 100) { archeryAnim.horizontal = 100; archeryAnim.dir = -1; }
          if (archeryAnim.horizontal <= -100) { archeryAnim.horizontal = -100; archeryAnim.dir = 1; }
        } else {
          archeryAnim.vertical += speed * archeryAnim.dir;
          if (archeryAnim.vertical >= 100) { archeryAnim.vertical = 100; archeryAnim.dir = -1; }
          if (archeryAnim.vertical <= -100) { archeryAnim.vertical = -100; archeryAnim.dir = 1; }
        }
        const marker = byId('archeryMarker');
        if (marker) {
          marker.style.left = `${50 + (archeryAnim.horizontal / 2)}%`;
          marker.style.top = `${50 - (archeryAnim.vertical / 2)}%`;
        }
        const phaseHint = byId('archeryHint');
        if (phaseHint) { phaseHint.textContent = archeryAnim.axis === 'H' ? 'Ajustement axe horizontal...' : 'Ajustement axe vertical...'; }
        archeryAnim.raf = requestAnimationFrame(tick);
      };
      archeryAnim.raf = requestAnimationFrame(tick);
    }

    function renderArrowsBottom(arrows) {
      const total = 2;
      const intact = Math.max(0, Math.min(total, Number(arrows ?? 2)));
      const broken = total - intact;
      return `<div class='archery-arrows-bottom'>${'<img src="/Visuels/archery_arrow_intact.png" alt="flèche intacte"/>'.repeat(intact)}${'<img src="/Visuels/archery_arrow_broken.png" alt="flèche cassée"/>'.repeat(broken)}</div>`;
    }

    function renderAction() {
      if (!st || !me) return;
      const phase = st.phase;
      byId('phase').textContent = phase === 'GAME_F' ? '' : `Phase: ${phase}`;
      const a = byId('action');
      const gs = st.gameState || {};
      document.body.classList.toggle('archery-active', phase === 'GAME_F');
      if (phase !== 'GAME_B') gameBUiState = { questionKey: '', value: '', validated: false };
      if (st.resultsShown) { a.innerHTML = '<p>Résultats affichés: réponses fermées.</p>'; return; }
      if (phase === 'GAME_A') { a.innerHTML = `<select id='t'>${playerList()}</select><button id='s'>Voter</button>`; byId('s').onclick = () => send('A_VOTE', { targetPlayerId: byId('t').value }); }
      else if (phase === 'GAME_G') {
        const seen = !!gs.hasSeenWord?.[me.playerId];
        if (gs.stage === 'WORD_REVEAL') {
          a.innerHTML = `<p>${seen ? '✅ Mot confirmé' : 'Clique pour révéler ton mot'}</p><button id='revealWord'>RÉVÉLER MON MOT</button><div id='wordBox' class='panel mt'></div><button id='seenWord' class='secondary mt' ${seen?'disabled':''}>J'ai pris connaissance de mon mot</button>`;
          byId('revealWord').onclick = () => {
            socket.emit('game:action', { type: 'G_FETCH_WORD', payload: {} }, (r) => {
              const box = byId('wordBox');
              if (!r?.ok) { box.innerHTML = `<div class='error-msg'>${r?.error || 'Erreur'}</div>`; return; }
              box.innerHTML = r.isImpostor ? `<div class='error-msg'>IMPOSTEUR</div>` : `<strong>${r.word || 'Mot secret'}</strong>`;
            });
          };
          byId('seenWord').onclick = () => send('G_CONFIRM_WORD', {});
        } else if (gs.stage === 'VOTE') {
          a.innerHTML = `<select id='gv'>${playerList()}</select><button id='gvs'>Voter imposteur</button>`;
          byId('gvs').onclick = () => send('G_VOTE', { targetPlayerId: byId('gv').value });
        } else {
          a.innerHTML = '<p>Attente de la suite (imposteur)...</p>';
        }
      }
      else if (phase === 'GAME_H') {
        const clicked = !!gs.clickedAt?.[me.playerId];
        a.innerHTML = `<p>${gs.stage === 'REVEALED' ? '🔥 TOTEM APPARU !' : 'Prépare-toi...'}</p><button id='grabTotem' ${gs.stage === 'REVEALED' && !clicked ? '' : 'disabled'}>ATTRAPER LE TOTEM</button>`;
        byId('grabTotem').onclick = () => send('H_GRAB_TOTEM', {});
      }
      else if (phase === 'GAME_I') {
        const picked = gs.doorChoices?.[me.playerId];
        a.innerHTML = `<p>Choisis une porte</p><div class='grid grid-3'><button data-door='1' ${picked?'disabled':''}>Porte 1</button><button data-door='2' ${picked?'disabled':''}>Porte 2</button><button data-door='3' ${picked?'disabled':''}>Porte 3</button></div>`;
        a.querySelectorAll('[data-door]').forEach((b)=>b.onclick=()=>send('I_PICK_DOOR',{door:Number(b.dataset.door)}));
      }
      else if (phase === 'GAME_B') {
        const qKey = `${gs.currentIndex ?? -1}|${gs.questions?.[gs.currentIndex]?.prompt || ''}`;
        if (gameBUiState.questionKey !== qKey) gameBUiState = { questionKey: qKey, value: '', validated: false };
        a.innerHTML = `<input id='ans' class='${gameBUiState.validated ? 'answer-validated' : ''}' placeholder='Ta réponse' value="${(gameBUiState.value || '').replace(/"/g,'&quot;')}"/><button id='s'>Envoyer</button><p class='small'>${gameBUiState.validated ? '✅ Réponse validée' : ''}</p>`;
        const ansEl = byId('ans');
        ansEl?.addEventListener('input', () => { gameBUiState.value = ansEl.value; gameBUiState.validated = false; ansEl.classList.remove('answer-validated'); });
        byId('s').onclick = () => {
          const answer = byId('ans').value;
          socket.emit('game:action', { type: 'B_ANSWER', payload: { answer } }, (r) => {
            const ack = byId('ack');
            if (r?.ok) {
              gameBUiState.value = answer;
              gameBUiState.validated = true;
              ack.classList.remove('error-msg');
              ack.textContent = '✅ Réponse envoyée';
              renderAction();
              return;
            }
            ack.classList.add('error-msg');
            ack.textContent = `❌ ${r?.error || 'Erreur'}`;
          });
        };
      }
      else if (phase === 'GAME_C') { const max=Math.max(0, Number(gs.maxPrice||0)); a.innerHTML = `<label for='g'>Ton prix: <strong id='gVal'>0 dh</strong></label><input id='g' type='range' min='0' max='${max}' step='1' value='0'/><button id='s'>Valider</button>`; const g=byId('g'); const gVal=byId('gVal'); g.oninput=()=>{gVal.textContent=`${g.value} dh`;}; byId('s').onclick = () => send('C_GUESS', { value: Number(g.value) }); }
      else if (phase === 'GAME_D') { a.innerHTML = `<p>🎧 Blind test en cours. Attends l'attribution des points par l'admin.</p>`; }
      else if (phase === 'GAME_E') { a.innerHTML = `<div class='grid grid-2'><button id='sh'>Partager</button><button id='be' class='danger'>Trahir</button></div>`; byId('sh').onclick = () => send('E_CHOICE', { choice: 'SHARE' }); byId('be').onclick = () => send('E_CHOICE', { choice: 'BETRAY' }); }
      else if (phase === 'GAME_F') {
        const meState = (st.rankings || []).find((p) => p.playerId === me.playerId) || {};
        const shot = gs.shots?.[me.playerId] || {};
        if ((meState.arrows ?? 2) <= 0) { stopArcheryAnim(); a.innerHTML = `<p class='error-msg'>Tu n'as plus de flèche, tu ne peux plus jouer.</p>${renderArrowsBottom(meState.arrows)}`; return; }
        const alive = (st.rankings || []).filter((p) => (p.arrows ?? 2) > 0 && !p.eliminated);
        if (gs.stage === 'BREAK_SELECT') {
          stopArcheryAnim();
          if (gs.closest !== me.playerId) { a.innerHTML = '<p>En attente du choix du meilleur tireur...</p>' + renderArrowsBottom(meState.arrows); return; }
          const opts = alive.filter((p) => p.playerId !== me.playerId).map((p) => `<option value='${p.playerId}'>${p.name}</option>`).join('');
          a.innerHTML = `<p>Tu es le plus proche 🎯 : choisis un joueur qui perd 1 flèche.</p><select id='bt'>${opts}</select><button id='s'>Casser une flèche</button>${renderArrowsBottom(meState.arrows)}`;
          byId('s').onclick = () => send('F_BREAK_TARGET', { targetPlayerId: byId('bt').value });
          return;
        }
        if (typeof shot.horizontal === 'number') archeryAnim.horizontal = shot.horizontal;
        if (typeof shot.vertical === 'number') archeryAnim.vertical = shot.vertical;
        if (typeof shot.horizontal === 'number' && typeof shot.vertical === 'number') {
          stopArcheryAnim();
          a.innerHTML = `<div class='archery-mobile-wrap'><div class='archery-mobile-target'><img src='/Visuels/archery_target_mobile.png' alt='cible'/><img id='archeryMarker' class='archery-mobile-marker' src='/Visuels/archery_arrow_marker.png' alt='marqueur' style='left:${50 + (archeryAnim.horizontal / 2)}%;top:${50 - (archeryAnim.vertical / 2)}%'/></div><p class='small'>Tir validé ✅</p></div>${renderArrowsBottom(meState.arrows)}`;
          return;
        }
        if (typeof shot.horizontal === 'number') { archeryAnim.axis = 'V'; }
        else { archeryAnim.axis = 'H'; archeryAnim.vertical = 0; }
        archeryAnim.dir = 1;
        a.innerHTML = `<div class='archery-mobile-wrap'><div class='archery-mobile-target'><img src='/Visuels/archery_target_mobile.png' alt='cible'/><img id='archeryMarker' class='archery-mobile-marker' src='/Visuels/archery_arrow_marker.png' alt='marqueur' style='left:${50 + (archeryAnim.horizontal / 2)}%;top:${50 - (archeryAnim.vertical / 2)}%'/></div><p id='archeryHint' class='small'>${archeryAnim.axis === 'H' ? 'Ajustement axe horizontal...' : 'Ajustement axe vertical...'}</p><button id='fireBtn'>Tirer</button></div>${renderArrowsBottom(meState.arrows)}`;
        startArcheryAnim();
        byId('fireBtn').onclick = () => {
          if (archeryAnim.axis === 'H') {
            send('F_AIM_HORIZONTAL', { value: Math.round(archeryAnim.horizontal) });
            archeryAnim.axis = 'V';
            archeryAnim.vertical = 0;
            archeryAnim.dir = 1;
          } else {
            send('F_AIM_VERTICAL', { value: Math.round(archeryAnim.vertical) });
            stopArcheryAnim();
            const hint = byId('archeryHint'); if (hint) hint.textContent = 'Tir envoyé ✅';
            const btn = byId('fireBtn'); if (btn) btn.disabled = true;
          }
        };
      }
      else if (phase === 'COUNCIL') { a.innerHTML = `<select id='v'>${playerList()}</select><button id='s'>Voter secret</button>`; byId('s').onclick = () => send('COUNCIL_VOTE', { targetPlayerId: byId('v').value }); }
      else if (phase === 'FINAL') { const finalist = (gs.finalists || []).includes(me.playerId); if (!finalist) { a.innerHTML = '<p>Tu n\'es pas finaliste.</p>'; return; } a.innerHTML = `<input id='bet' type='number' min='0' max='5' placeholder='Mise 0-5'/><input id='ans' placeholder='Réponse finale'/><button id='s'>Envoyer finale</button>`; byId('s').onclick = () => send('FINAL_BET_ANSWER', { bet: Number(byId('bet').value), answer: byId('ans').value }); }
      else if (phase === 'END') { const rows=(st.gameState?.finalRanking||st.rankings||[]).map((p)=>`<li ${p.playerId===me.playerId?'style="font-weight:700"':''}>#${p.rank} ${p.name} — ${p.score} pts</li>`).join(''); a.innerHTML = `<h3>Classement final</h3><ol>${rows}</ol>`; }
      else { stopArcheryAnim(); a.innerHTML = '<p>En attente de la prochaine épreuve...</p>'; }
    }

    byId('characterPrev').addEventListener('click', () => {
      carouselIndex = normalizeIndex(carouselIndex - 1);
      selectedCharacter = CHARACTERS[carouselIndex].file;
      renderCharacterCarousel();
    });

    byId('characterNext').addEventListener('click', () => {
      carouselIndex = normalizeIndex(carouselIndex + 1);
      selectedCharacter = CHARACTERS[carouselIndex].file;
      renderCharacterCarousel();
    });

    byId('join').addEventListener('click', () => {
      const s = load();
      const name = (byId('name').value || s?.name || '').trim();
      if (!name) return alert('Le pseudo est obligatoire.');
      socket.emit('room:join', {
        playerId: s?.playerId,
        reconnectToken: s?.reconnectToken,
        name,
        animal: selectedCharacter
      }, (r) => {
        if (!r?.ok) return alert(r?.error || 'Impossible');
        save({
          playerId: r.player.playerId,
          reconnectToken: r.player.reconnectToken,
          name: r.player.name,
          animal: selectedCharacter
        });
        joined(r.player);
        renderAction();
      });
    });

    const s = load();
    if (s?.name) byId('name').value = s.name;
    if (s?.animal && CHARACTERS.some((c) => c.file === s.animal)) {
      selectedCharacter = s.animal;
      carouselIndex = CHARACTERS.findIndex((c) => c.file === s.animal);
    }
    renderCharacterCarousel();

    if (s?.playerId && s?.reconnectToken) {
      socket.emit('room:join', s, (r) => { if (r?.ok) { joined(r.player); } });
    }

    socket.on('game:state', (s0) => { const prevPhase=st?.phase; const prevQuestion=st?.gameState?.currentIndex; st = s0; if(prevPhase!==s0.phase || (s0.phase==='GAME_B' && prevQuestion!==s0.gameState?.currentIndex)){ clearAck(); } updateScore(); renderAction(); });
    socket.on('game:reset', () => { stopArcheryAnim(); document.body.classList.remove('archery-active'); localStorage.removeItem(KEY); location.reload(); });
  </script>
</body>
</html>
