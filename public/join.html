<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aventurier • Koh Lanta</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">🌴 Entrée Aventurier</h1>
    <section id="form" class="panel">
      <div class="grid">
        <input id="name" placeholder="Ton nom" maxlength="24" />
        <input id="animal" placeholder="Ton animal fétiche" maxlength="24" />
        <button id="join">Rejoindre la tribu</button>
      </div>
    </section>

    <section id="ok" class="panel mt" style="display:none">
      <h2>Bienvenue dans la tribu ✅</h2>
      <p id="me"></p>
      <p id="hint" class="small">En attente...</p>
      <button id="ready" class="secondary">Je suis prêt</button>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ['websocket','polling'] });
    const byId = (id) => document.getElementById(id);
    let current = { playerId: '', reconnectToken: '', ready: false };
    const KEY = 'kla_singleton_player';

    function save(d){ localStorage.setItem(KEY, JSON.stringify(d)); }
    function load(){ try { return JSON.parse(localStorage.getItem(KEY)||'null'); } catch { return null; } }

    function setJoined(player) {
      current.playerId = player.playerId;
      current.reconnectToken = player.reconnectToken;
      byId('form').style.display = 'none';
      byId('ok').style.display = '';
      byId('me').textContent = `${player.name} • Animal fétiche: ${player.animal}`;
      save({ playerId: player.playerId, reconnectToken: player.reconnectToken, name: player.name, animal: player.animal });
    }

    byId('join').onclick = () => {
      const sess = load();
      const name = byId('name').value.trim() || sess?.name || 'Aventurier';
      const animal = byId('animal').value.trim() || sess?.animal || 'Tigre';
      socket.emit('room:join', { playerId: sess?.playerId, reconnectToken: sess?.reconnectToken, name, animal }, (res) => {
        if (!res?.ok) return alert(res?.error || 'Impossible de rejoindre');
        setJoined(res.player);
      });
    };

    byId('ready').onclick = () => {
      current.ready = !current.ready;
      socket.emit('player:update', { playerId: current.playerId, ready: current.ready });
      byId('ready').textContent = current.ready ? 'Prêt ✅' : 'Je suis prêt';
    };

    socket.on('tv:state', (s) => {
      byId('hint').textContent = s.screen === 'LOBBY' ? 'Lobby...' : s.screen === 'WAITING' ? 'Attente collective...' : 'Épreuve à venir...';
    });

    const sess = load();
    if (sess?.playerId && sess?.reconnectToken) {
      socket.emit('room:join', { playerId: sess.playerId, reconnectToken: sess.reconnectToken, name: sess.name, animal: sess.animal }, (res) => {
        if (res?.ok) setJoined(res.player);
      });
    }
  </script>
</body>
</html>
