<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Koh Lanta • Le Ftour des Aventuriers</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title flicker">Koh Lanta — Le Ftour des Aventuriers</h1>
    <p class="subtitle">Backbone multi-écrans : TV, Admin et Joueurs mobiles.</p>

    <div class="grid grid-2 mt">
      <section class="panel">
        <h2>🎛️ Admin</h2>
        <p>Crée une room, contrôle la session et pilote l’écran TV.</p>
        <a href="/admin/NEW"><button>Ouvrir l’espace Admin</button></a>
      </section>

      <section class="panel">
        <h2>📱 Joueur</h2>
        <p>Rejoins une room avec un code ou un QR code.</p>
        <a href="/join"><button class="secondary">Rejoindre une room</button></a>
      </section>
    </div>
  </div>
</body>
