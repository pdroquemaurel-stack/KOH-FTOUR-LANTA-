<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin</title><link rel="stylesheet" href="/style.css"/></head><body>
<div class="container"><h1 class="title">🛡️ Admin</h1>
<section id="auth" class="panel"><input id="pwd" type="password" placeholder="Mot de passe Admin"/><button id="login" class="mt">Connexion</button></section>
<section id="dash" class="panel mt" style="display:none">
  <div id='tvAudioError' class='panel error-msg' style='display:none'></div>
  <div class="phase-banner">ÉTAPE ACTUELLE : <span id="phase">LOBBY</span></div>

  <div class="panel mt">
    <h3>Choisir le jeu et la question</h3>
    <select id="gamePicker"></select>
    <select id="questionPicker" class="mt"></select>
    <div class="admin-actions mt">
      <button id="launchGame">Lancer le jeu sélectionné</button>
      <button id="showResults" class="secondary">Montrer les résultats</button>
      <button id="toggleTvMute" class="secondary">TV: Muet</button>
      <button id="resetGame" class="danger">Réinitialiser le jeu</button>
    </div>
  </div>

  <div id="results" class="panel mt" style="display:none">
    <h3>Résultats Jeu A</h3>
    <ol id="top3"></ol>
    <ul id="impactList" class="roster"></ul>
  </div>

  <div class="panel mt">
    <h3>Scores joueurs</h3>
    <ul id="roster" class="roster"></ul>
  </div>
</section></div>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io({transports:['websocket','polling']});let state=null;const byId=id=>document.getElementById(id);
const GAME_LABELS={GAME_A:'Jeu A — Susceptible de...',GAME_B:'Jeu B',GAME_C:'Jeu C',GAME_D:'Jeu D',GAME_F:'Jeu F — Vise bien ou fais toi des amis'};
function cmd(command,payload,cb){socket.emit('admin:command',{command,payload},cb);}
function scoreControls(p){ return `<div class='score-ctl'><button data-score='-1' data-p='${p.playerId}' class='secondary'>-1</button><strong>${p.score}</strong><button data-score='1' data-p='${p.playerId}'>+1</button></div>`; }
function arrowControls(p){ const arrows=Math.max(0,Math.min(2,Number(p.arrows??2))); return `<button class='secondary' data-restore-arrow='${p.playerId}'>🏹 ${arrows}/2 (+1)</button>`; }
function fmtImpact(v){ if(v>0) return `<span class='plus'>+${v}</span>`; if(v<0) return `<span class='minus'>${v}</span>`; return '0'; }
function fillGamePicker(s){
  const gp=byId('gamePicker'); const catalog=s.gameCatalog||{};
  const previous=gp.value;
  gp.innerHTML=Object.keys(catalog).map((game)=>`<option value='${game}'>${GAME_LABELS[game]||game}</option>`).join('')||"<option value='GAME_A'>Jeu A</option>";
  if(previous && [...gp.options].some((o)=>o.value===previous)) gp.value=previous;
}
function fillQuestionPicker(s){
  const game=byId('gamePicker').value||'GAME_A';
  const qp=byId('questionPicker');
  const list=(s.gameCatalog&&s.gameCatalog[game])||[];
  qp.innerHTML=list.map((q)=>`<option value='${q.index}'>${q.index+1}. ${q.label}</option>`).join('')||"<option value='0'>1. Question par défaut</option>";
}
function renderResults(s){
  const r=s.gameState?.results;
  if(!r){ byId('results').style.display='none'; return; }
  byId('results').style.display='';
  if(r.game==='A'){
    byId('top3').innerHTML=(r.top3||[]).map((t,idx)=>`<li>#${idx+1} - ${(s.rankings.find(p=>p.playerId===t.playerId)?.name)||t.playerId} (${t.votesCount} votes)</li>`).join('')||'<li>Aucun vote</li>';
    byId('impactList').innerHTML=s.rankings.map((p)=>`<li><div><strong>${p.name}</strong></div><div>${fmtImpact((r.impacts||{})[p.playerId]||0)}</div></li>`).join('');
    return;
  }
  byId('top3').innerHTML=`<li>Résultats ${r.game||''}</li>`;
  byId('impactList').innerHTML=`<li><pre>${JSON.stringify(r,null,2)}</pre></li>`;
}
function render(s){
  state=s; byId('phase').textContent=s.phase; byId('toggleTvMute').textContent=s.tvMuted?'TV: Démuter':'TV: Muter';
  fillGamePicker(s); fillQuestionPicker(s);
  const roster=byId('roster'); roster.innerHTML='';
  s.rankings.forEach((p)=>{ const li=document.createElement('li'); li.innerHTML=`<div>#${p.rank} <strong>${p.name}</strong> <span class='small'>(${p.animal})</span> ${p.eliminated?'🪦':''}</div><div class='grid'>${arrowControls(p)}${scoreControls(p)}</div>`; roster.appendChild(li); });
  const audioErr=byId('tvAudioError');
  if(s.lastTvAudioError){ audioErr.style.display=''; audioErr.textContent=`⚠️ Audio TV: ${s.lastTvAudioError.reason} (${new Date(s.lastTvAudioError.at).toLocaleTimeString()})`; }
  else { audioErr.style.display='none'; audioErr.textContent=''; }
  renderResults(s);
  roster.querySelectorAll('[data-score]').forEach((b)=>b.onclick=()=>cmd('UPDATE_SCORE',{playerId:b.dataset.p,delta:Number(b.dataset.score)}));
  roster.querySelectorAll('[data-restore-arrow]').forEach((b)=>b.onclick=()=>cmd('RESTORE_ARROW',{playerId:b.dataset.restoreArrow}));
}

byId('gamePicker').onchange=()=>fillQuestionPicker(state||{});
byId('login').onclick=()=>socket.emit('admin:auth',{password:byId('pwd').value},(r)=>{if(!r?.ok)return alert('Mot de passe incorrect');byId('auth').style.display='none';byId('dash').style.display='';render(r.state);});
byId('launchGame').onclick=()=>cmd('LAUNCH_GAME',{game:byId('gamePicker').value,questionIndex:Number(byId('questionPicker').value||0)},(r)=>{if(!r?.ok) alert(r.error||'Launch impossible');});
byId('showResults').onclick=()=>cmd('SHOW_RESULTS',{},(r)=>{if(!r?.ok) alert(r.error||'Action impossible');});
byId('toggleTvMute').onclick=()=>cmd('SET_TV_MUTED',{muted:!state?.tvMuted});
byId('resetGame').onclick=()=>{ if(confirm('Réinitialiser toute la partie ?')) cmd('RESET_GAME'); };
socket.on('game:state',render); socket.on('admin:revoked',()=>alert('Session admin reprise ailleurs')); socket.on('admin:tv_audio_error',(e)=>{ const box=byId('tvAudioError'); box.style.display=''; box.textContent=`⚠️ Audio TV bloqué: ${e.reason}`; });
</script></body></html>
